<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

/* HEADER */
.warning{
    background:#1a0008;
    color:#ff4d88;
    text-align:center;
    padding:12px;
    font-weight:bold;
    border-bottom:1px solid #ff2d6f;
    position:sticky;
    top:0;
    z-index:999;
    font-size:14px;
}

/* HERO */
.hero{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* VIDEO */
.video-box{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,45,111,.4);
}

.video-box img{
    width:100%;
    display:block;
    border-radius:15px;
    transition:.4s;
}

.video-box:hover img{
    transform:scale(1.03);
}

/* PLAY BUTTON */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    background:rgba(255,0,85,.8);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    animation:pulse 1.5s infinite;
    backdrop-filter:blur(5px);
}

@keyframes pulse{
    0%{
        transform:translate(-50%,-50%) scale(1);
    }
    50%{
        transform:translate(-50%,-50%) scale(1.1);
    }
    100%{
        transform:translate(-50%,-50%) scale(1);
    }
}

/* DURASI */
.duration{
    position:absolute;
    bottom:15px;
    right:15px;
    background:rgba(0,0,0,.7);
    padding:5px 10px;
    border-radius:8px;
    font-size:14px;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:25px;
}

.title h1{
    font-size:42px;
    color:#ff2d6f;
    margin-bottom:10px;
}

.title p{
    color:#ccc;
    line-height:1.6;
    max-width:700px;
    margin:auto;
}

/* BUTTONS */
.button-group{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.watch-btn{
    display:block;
    text-align:center;
    background:#ff2d6f;
    padding:18px;
    border-radius:12px;
    color:#fff;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 0 15px rgba(255,45,111,.3);
}

.watch-btn:hover{
    background:#ff4d88;
    transform:translateY(-2px);
}

/* BANNER */
.banner{
    margin-top:30px;
    display:flex;
    justify-content:center;
    overflow:hidden;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:30px;
}

.gallery img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #ff2d6f;
    cursor:pointer;
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

/* INFO */
.info{
    margin-top:30px;
    text-align:center;
    color:#aaa;
    font-size:14px;
    padding-bottom:30px;
    line-height:1.8;
}

/* MOBILE */
@media(max-width:768px){

.title h1{
    font-size:28px;
}

.play-btn{
    width:90px;
    height:90px;
    font-size:45px;
}

.gallery{
    grid-template-columns:repeat(2,1fr);
}

.gallery img{
    height:120px;
}

.watch-btn{
    font-size:18px;
    padding:15px;
}

}

</style>
